<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Console — Computer Warriors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDF0F4;
    --paper-2:#F7F9FB;
    --card:#FFFFFF;
    --ink:#111721;
    --muted:#5A6472;
    --faint:#8B95A3;
    --line:#DFE4EB;
    --line-soft:#EDF0F4;
    --navy:#111C2E;
    --navy-2:#1B2A42;
    --accent:#E08A20;
    --accent-deep:#B4650C;
    --accent-soft:#FDF1DF;
    --accent-line:#F2D8AC;
    --alert:#BE3A31;
    --alert-soft:#FCEDEB;
    --alert-line:#F2CBC6;
    --good:#1E7A55;
    --good-soft:#E4F1EB;
    --r:12px;
    --sh-1:0 1px 2px rgba(17,23,33,.05);
    --sh-2:0 1px 3px rgba(17,23,33,.06), 0 8px 24px -6px rgba(17,23,33,.10);
    --sh-3:0 2px 6px rgba(17,23,33,.07), 0 16px 40px -12px rgba(17,23,33,.18);
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;line-height:1.55;font-size:15px}
  button{font-family:inherit;color:inherit}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}

  .shell{display:flex;flex-direction:column;min-height:100%}

  /* ================= header ================= */
  header.topbar{
    background:linear-gradient(180deg,var(--navy-2),var(--navy));
    color:#fff;display:flex;align-items:center;gap:14px;padding:14px 24px;
    position:sticky;top:0;z-index:40;box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 6px 24px -8px rgba(17,23,33,.5);
  }
  .brand{display:flex;align-items:center;gap:13px;min-width:0}
  .brand-logo{height:38px;width:auto;flex:none;display:block}
  .brand-sep{width:1px;height:26px;background:rgba(255,255,255,.18);flex:none}
  .brand-tool{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:.2px;color:#EAF0F8;white-space:nowrap}
  .topbar .spacer{flex:1}
  .topbar-btn{
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:#D9E1EC;
    padding:8px 15px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:background .15s,color .15s;
  }
  .topbar-btn:hover{background:rgba(255,255,255,.14);color:#fff}
  .topbar-btn.primary{
    background:linear-gradient(180deg,#F0A03A,var(--accent));border-color:transparent;color:#241202;font-weight:600;
    box-shadow:0 2px 8px -2px rgba(224,138,32,.6), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .topbar-btn.primary:hover{background:linear-gradient(180deg,#F5A945,#E8912A);color:#241202}

  .work{max-width:1060px;width:100%;margin:0 auto;padding:32px 24px 72px;flex:1}

  /* ================= home ================= */
  .greet-home{margin-bottom:34px}
  .eyebrow{
    font-size:10px;letter-spacing:1.7px;text-transform:uppercase;color:var(--accent-deep);
    font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:9px;
  }
  .eyebrow::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--accent-line),transparent)}
  .home-head{margin:0 0 18px}
  .home-head h2{font-family:var(--disp);font-size:27px;font-weight:600;margin:0 0 4px;letter-spacing:-.6px}
  .home-head p{margin:0;color:var(--muted);font-size:14px}

  .tiles{display:grid;gap:11px}
  .tile{
    position:relative;overflow:hidden;text-align:left;background:var(--card);
    border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);
    padding:17px 18px;cursor:pointer;display:flex;align-items:center;gap:16px;
    transition:transform .16s cubic-bezier(.2,.7,.3,1),box-shadow .16s,border-color .16s;
  }
  .tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tint);opacity:0;transition:opacity .16s}
  .tile:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:#CFD7E1}
  .tile:hover::before{opacity:1}
  .tile .ic{
    width:44px;height:44px;border-radius:11px;flex:none;display:grid;place-items:center;
    background:var(--tint-soft);color:var(--tint);transition:transform .16s;
  }
  .tile:hover .ic{transform:scale(1.05)}
  .tile .ic svg{width:22px;height:22px}
  .tile .txt{flex:1;min-width:0}
  .tile h3{font-family:var(--disp);font-size:16.5px;font-weight:600;margin:0 0 2px;letter-spacing:-.3px}
  .tile p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.45}
  .tile .arr{color:#C6CEDA;flex:none;transition:color .16s,transform .16s}
  .tile .arr svg{width:18px;height:18px;display:block}
  .tile:hover .arr{color:var(--tint);transform:translateX(3px)}

  /* ================= flow chrome ================= */
  .flowbar{display:flex;align-items:center;gap:13px;margin-bottom:16px;flex-wrap:wrap}
  .back{
    background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 13px;
    font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;display:inline-flex;gap:6px;align-items:center;
    box-shadow:var(--sh-1);transition:all .14s;
  }
  .back:hover{color:var(--ink);border-color:#CFD7E1;transform:translateX(-1px)}
  .back svg{width:15px;height:15px}
  .flowtag{display:inline-flex;align-items:center;gap:9px;font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);font-weight:600}
  .flowtag .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
  .steptrack{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.5px}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-2);overflow:hidden;position:relative}
  .panel::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--flow,var(--accent))}
  .greet-home::before{background:var(--accent)}
  .panel-body{padding:30px 32px 30px}
  .step-title{font-family:var(--disp);font-size:24px;font-weight:600;margin:0 0 4px;letter-spacing:-.6px;line-height:1.25}
  .step-sub{margin:0 0 20px;color:var(--muted);font-size:14px}

  /* ================= say block ================= */
  .say{
    position:relative;background:linear-gradient(165deg,var(--navy-2),var(--navy));
    color:#EEF2F8;border-radius:13px;padding:20px 24px 20px 26px;margin:4px 0 18px;
    font-size:16px;line-height:1.62;box-shadow:var(--sh-2), inset 0 1px 0 rgba(255,255,255,.07);
  }
  .say::after{
    content:"";position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:0 3px 3px 0;
    background:linear-gradient(180deg,var(--accent),transparent);
  }
  .say .lbl{display:block;font-size:9.5px;letter-spacing:1.7px;text-transform:uppercase;color:#8497B2;margin-bottom:11px;font-weight:600}
  .say p{margin:0 0 13px}.say p:last-child{margin-bottom:0}
  .say-price{font-family:var(--mono);font-weight:600;color:#FFC880;background:rgba(255,200,128,.1);padding:1px 6px;border-radius:5px}

  /* ================= internal note ================= */
  .note{
    background:var(--accent-soft);border:1px solid var(--accent-line);border-left:3px solid var(--accent);
    border-radius:9px;padding:12px 15px;margin:0 0 18px;font-size:13.5px;color:#6E4708;line-height:1.6;
  }
  .note .nk{display:block;font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent-deep);font-weight:600;margin-bottom:4px}
  .note.warn{background:var(--alert-soft);border-color:var(--alert-line);border-left-color:var(--alert);color:#7E2A23}
  .note.warn .nk{color:var(--alert)}
  .note b{color:#3A2A0A;font-weight:600}
  .note .near{display:block;color:#8A6A2A;font-size:12.5px;margin-top:2px}

  /* ================= choices ================= */
  .choices{display:grid;gap:10px;margin-top:20px}
  .choice{
    text-align:left;background:var(--paper-2);border:1.5px solid var(--line);border-radius:11px;
    padding:15px 17px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:14px;
    transition:all .15s cubic-bezier(.2,.7,.3,1);
  }
  .choice:hover{background:var(--card);border-color:var(--flow,var(--accent));transform:translateX(3px);box-shadow:var(--sh-1)}
  .choice .lab{font-family:var(--disp);font-size:16px;font-weight:600;letter-spacing:-.3px}
  .choice small{display:block;font-family:var(--body);font-weight:400;color:var(--muted);font-size:12.5px;margin-top:3px;letter-spacing:0}
  .choice .arr{color:#C6CEDA;flex:none;transition:color .15s,transform .15s}
  .choice .arr svg{width:17px;height:17px;display:block}
  .choice:hover .arr{color:var(--flow,var(--accent));transform:translateX(2px)}

  /* ================= accordions ================= */
  .sec-lbl{
    font-size:9.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:1.7px;
    margin:30px 0 6px;display:flex;align-items:center;gap:10px;
  }
  .sec-lbl::after{content:"";flex:1;height:1px;background:var(--line)}
  .acc{border:1.5px solid var(--line);border-radius:11px;margin-bottom:9px;overflow:hidden;background:var(--card);transition:border-color .15s,box-shadow .15s}
  .acc:hover{border-color:#CFD7E1}
  .acc.open{border-color:var(--flow,var(--accent));box-shadow:var(--sh-1)}
  .acc-head{width:100%;display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--paper-2);border:none;cursor:pointer;text-align:left;transition:background .15s}
  .acc-head:hover{background:#F1F4F8}
  .acc.open .acc-head{background:var(--card);border-bottom:1px solid var(--line-soft)}
  .acc-title{font-family:var(--disp);font-size:15.5px;font-weight:600;letter-spacing:-.3px}
  .acc-meta{margin-left:auto;font-size:11.5px;color:var(--faint);text-align:right;max-width:50%}
  .acc-arr{color:#C6CEDA;flex:none;transition:transform .2s,color .15s}
  .acc-arr svg{width:17px;height:17px;display:block}
  .acc.open .acc-arr{transform:rotate(180deg);color:var(--flow,var(--accent))}
  .acc-body{display:none;padding:18px 16px 18px}
  .acc.open .acc-body{display:block}

  /* ================= calculator ================= */
  .calc{
    background:linear-gradient(165deg,var(--navy-2),var(--navy));border-radius:12px;padding:17px 19px;margin-bottom:18px;
    box-shadow:var(--sh-2), inset 0 1px 0 rgba(255,255,255,.07);
  }
  .calc-lbl{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:#8497B2;font-weight:600;margin-bottom:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .feed-tag{font-size:9.5px;letter-spacing:1.2px;font-weight:600;text-transform:uppercase}
  .feed-tag.okfeed{color:#6FBF95}
  .feed-tag.warnfeed{color:#D9A05B}
  .c-model-field{flex:2;min-width:170px}
  .c-field input:read-only{opacity:.55;cursor:not-allowed}
  .calc-inputs{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:15px}
  .c-field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:104px}
  .c-field .cl{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#8497B2;font-weight:600}
  .c-field input,.c-field select{
    font-family:var(--mono);font-size:15px;font-weight:500;color:#fff;background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:9px 11px;width:100%;transition:all .15s;
  }
  .c-field select{font-family:var(--body);font-size:14px;font-weight:500}
  .c-field select option{color:var(--ink)}
  .c-field input::placeholder{color:#6B7C93}
  .c-field input:focus,.c-field select:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,.12);box-shadow:0 0 0 3px rgba(224,138,32,.16)}
  .calc-out{display:flex;flex-wrap:wrap;gap:14px;align-items:stretch;border-top:1px solid rgba(255,255,255,.12);padding-top:15px}
  .price-main{
    flex:1;min-width:170px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 14px;
    font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#8497B2;font-weight:600;
  }
  .price-main b{display:block;font-family:var(--mono);font-size:26px;font-weight:600;color:#fff;letter-spacing:-1px;margin-top:4px;line-height:1.1}
  .price-main .plus{font-family:var(--body);font-size:11px;letter-spacing:.3px;text-transform:none;color:#8497B2;font-weight:400;margin-left:7px}
  .price-mra{
    flex:1;min-width:150px;background:rgba(224,138,32,.1);border:1px solid rgba(224,138,32,.28);border-radius:9px;padding:10px 14px;
    font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#C9A374;font-weight:600;
  }
  .price-mra b{display:block;font-family:var(--mono);font-size:20px;font-weight:600;color:#FFC880;margin-top:5px;letter-spacing:-.6px;line-height:1.15}

  .cov{
    font-size:13px;color:var(--muted);background:var(--good-soft);border:1px solid #C9E2D5;border-radius:9px;padding:10px 14px;
    display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;
  }
  .cov .ck{font-size:9.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--good);font-weight:600;flex:none}
  .cov .c-cov,.cov{color:#1F4A38}

  /* ================= closing ================= */
  .closing{margin-top:32px;padding-top:24px;border-top:1px dashed var(--line)}
  .closing-h{font-family:var(--disp);font-size:18px;font-weight:600;margin-bottom:15px;letter-spacing:-.4px;display:flex;align-items:center;gap:9px}
  .closing-h::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .closing-sub{margin:-8px 0 14px;color:var(--muted);font-size:13.5px}
  .signoff{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line)}
  .obj-btns{display:flex;gap:9px;flex-wrap:wrap;margin:2px 0}
  .obj-btns.sub{margin-top:14px}
  .obj-b{
    border:1.5px solid var(--line);background:var(--card);border-radius:9px;padding:9px 16px;
    font-size:13.5px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .14s;box-shadow:var(--sh-1);
  }
  .obj-b:hover{border-color:var(--accent);color:var(--ink);transform:translateY(-1px)}
  .obj-b.on{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:var(--sh-2)}
  .reveal{display:none;margin-top:16px}
  .reveal.show{display:block;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .mini-note{
    font-size:12.5px;color:#6E4708;background:var(--accent-soft);border:1px solid var(--accent-line);
    border-radius:8px;padding:9px 13px;margin-top:-6px;
  }
  .mini-note b{color:#3A2A0A;font-weight:600;font-family:var(--mono);font-size:12px}

  /* ================= checklist ================= */
  .checklist-lbl{
    font-size:9.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:1.7px;
    margin:32px 0 10px;display:flex;align-items:center;gap:10px;
  }
  .checklist-lbl::after{content:"";flex:1;height:1px;background:var(--line)}
  .actions-list{display:grid;gap:8px}
  .act{
    width:100%;display:flex;align-items:flex-start;gap:12px;border:1.5px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;background:var(--paper-2);transition:all .14s;font-size:14px;text-align:left;color:var(--ink);
  }
  .act:hover{border-color:#CFD7E1;background:var(--card)}
  .act .box{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--faint);flex:none;display:grid;place-items:center;margin-top:2px;transition:all .14s}
  .act.on{background:var(--good-soft);border-color:#C9E2D5;color:var(--muted)}
  .act.on .box{background:var(--good);border-color:var(--good)}
  .act.on .box svg{opacity:1}
  .act .box svg{width:11px;height:11px;opacity:0;color:#fff}
  .act.on .lbl-txt{text-decoration:line-through;text-decoration-color:#A9C4B6}

  /* ================= footer ================= */
  .footer-nav{display:flex;gap:11px;align-items:center;padding:18px 32px;border-top:1px solid var(--line);background:var(--paper-2)}
  .btn-primary{
    background:linear-gradient(180deg,#F0A03A,var(--accent));color:#241202;border:none;border-radius:10px;
    padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:9px;
    box-shadow:0 2px 10px -2px rgba(224,138,32,.55), inset 0 1px 0 rgba(255,255,255,.32);transition:transform .14s,box-shadow .14s;
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px -2px rgba(224,138,32,.6), inset 0 1px 0 rgba(255,255,255,.32)}
  .btn-primary svg{width:15px;height:15px}
  .btn-ghost{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:11px 20px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .14s}
  .btn-ghost:hover{color:var(--ink);border-color:#CFD7E1}
  .footer-nav .push{margin-left:auto}
  .hint{font-size:12px;color:var(--faint)}

  /* ================= embedded form ================= */
  .embed{margin:2px 0 20px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);box-shadow:var(--sh-1)}
  .embed-lbl{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);font-weight:600;padding:12px 16px;border-bottom:1px solid var(--line-soft);background:var(--paper-2)}
  .embed iframe{display:block}
  .embed-open{display:block;text-align:center;font-size:12.5px;font-weight:600;color:var(--accent-deep);text-decoration:none;padding:11px;border-top:1px solid var(--line-soft);background:var(--paper-2)}
  .embed-open:hover{background:var(--accent-soft)}

  /* ================= split screen ================= */
  /* ---- pane top alignment: first block flush with the other column ---- */
  .pane > :first-child{margin-top:0}
  .pane-choices > .closing:first-child,
  .pane-choices > .signoff:first-child{margin-top:0;padding-top:0;border-top:none}

  .panel-head{padding:26px 30px 4px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:16px 30px 28px;align-items:start}
  .split.solo{grid-template-columns:1fr}
  .pane{min-width:0}
  .pane-script{position:sticky;top:20px;align-self:start}
  .pane-choices{min-width:0}
  .pane-title{font-family:var(--disp);font-size:15px;font-weight:600;letter-spacing:.2px;margin:0 0 3px;color:var(--ink)}
  .pane-sub{color:var(--muted);font-size:13px;margin:0 0 14px}
  .split .scroll-list{max-height:56vh}
  .fullrow{padding:20px 30px 26px;border-top:1px dashed var(--line);margin-top:4px}
  .fullrow .closing{margin-top:0;padding-top:0;border-top:none}
  @media (max-width:880px){
    .split{grid-template-columns:1fr;gap:16px;padding:14px 18px 22px}
    .fullrow{padding:16px 18px 20px}
    .pane-script{position:static;top:auto}
    .panel-head{padding:22px 18px 2px}
    .split .scroll-list{max-height:46vh}
  }

  /* ================= model search + scroll ================= */
  .model-search{position:relative;margin:2px 0 12px}
  .model-search input{width:100%;box-sizing:border-box;font-family:var(--body);font-size:15px;color:var(--ink);
    padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:10px;background:var(--card);outline:none;transition:border-color .15s,box-shadow .15s}
  .model-search input:focus{border-color:var(--flow,#3A6EA5);box-shadow:0 0 0 3px color-mix(in srgb,var(--flow,#3A6EA5) 16%,transparent)}
  .model-search input::placeholder{color:var(--faint)}
  .model-search .ms-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint);pointer-events:none}
  .model-search .ms-ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
  .scroll-list{max-height:46vh;overflow-y:auto;padding-right:4px;-webkit-overflow-scrolling:touch;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .scroll-list::-webkit-scrollbar{width:8px}
  .scroll-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .scroll-list::-webkit-scrollbar-track{background:transparent}
  .no-match{padding:14px 4px;color:var(--faint);font-size:13.5px;text-align:center}
  .model-other{border-style:dashed}

  /* ================= wiki price hero ================= */
  .pricehero{border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:2px 0 18px;background:linear-gradient(180deg,#FFFFFF,#FBFCF9);box-shadow:var(--sh-1)}
  .ph-head{font-size:9.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .ph-amt{font-family:var(--mono);font-size:38px;font-weight:600;color:var(--ink);letter-spacing:-1.5px;line-height:1}
  .ph-plus{font-family:var(--body);font-size:13px;letter-spacing:.3px;color:var(--faint);font-weight:400;margin-left:9px}
  .ph-warr{margin-top:9px;font-size:13px;font-weight:500;color:var(--good);background:var(--good-soft);border:1px solid #C9E2D5;border-radius:7px;padding:5px 11px;display:inline-block}
  .feed-line{font-size:11.5px;color:var(--good);font-weight:500;margin:-8px 0 14px}
  .feed-tag.okfeed{color:var(--good)}
  .feed-tag.warnfeed{color:var(--accent-deep)}

  /* ================= device result ================= */
  .result-meta{display:flex;align-items:center;gap:9px;margin:-2px 0 18px;font-size:12.5px;color:var(--muted);font-weight:500}
  .result-meta .dotsep{color:var(--faint)}
  .result-wrap{margin-bottom:4px}
  .c-model-fixed{display:flex;flex-direction:column;gap:6px;flex:1;min-width:104px}
  .c-model-fixed .cl{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#8497B2;font-weight:600}
  .c-model-fixed .mv{font-family:var(--body);font-size:15px;font-weight:600;color:#fff;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.15)}

  /* ================= info ================= */
  .cheat{font-size:14px;color:var(--muted);list-style:none;padding:0;margin:0;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .cheat li{padding:12px 16px;border-bottom:1px solid var(--line-soft);display:flex;gap:16px;align-items:baseline;background:var(--card)}
  .cheat li:nth-child(even){background:var(--paper-2)}
  .cheat li:last-child{border-bottom:none}
  .cheat .ct{font-weight:600;color:var(--ink);flex:none;width:196px;font-size:13.5px}
  @media(max-width:600px){.cheat li{display:block}.cheat .ct{width:auto;margin-bottom:2px}}

  @media(max-width:600px){
    header.topbar{padding:12px 16px}
    .topbar-btn{padding:8px 12px}
    .brand-logo{height:32px}
    .brand{gap:10px}
    .work{padding:22px 16px 56px}
    .panel-body{padding:22px 18px 22px}
    .footer-nav{padding:16px 18px}
    .say{padding:18px 18px 18px 20px;font-size:15.5px}
    .step-title{font-size:21px}
    .tile .ic{width:40px;height:40px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

/* ---- live pricing feed (reads the cw-pricing-data shape) ---- */
let PRICING={cats:{},updated:null,ok:false,loading:true,error:null};
async function loadPricing(){
  try{
    const parts=await Promise.all(PRICING_URLS.map(u=>fetch(u,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})));
    const cats={}; let updated=null;
    for(const d of parts){
      if(d&&d._generated) updated=String(d._generated).slice(0,10);
      for(const k of Object.keys(d||{})){ if(k[0]==='_') continue; if(d[k]&&d[k].models) cats[k]=d[k]; }
    }
    if(!Object.keys(cats).length) throw new Error('no categories');
    PRICING={cats,updated,ok:true,loading:false,error:null};
  }catch(e){ PRICING={cats:{},updated:null,ok:false,loading:false,error:e.message}; }
}
function poolCat(pool){ return PRICING.cats[String(pool||'').toLowerCase()]||null; }
function modelsForPool(pool){ const c=poolCat(pool); return c?Object.keys(c.models):[]; }
function modelRepairs(pool,model){ const c=poolCat(pool); const m=c&&c.models&&c.models[model]; return m?Object.keys(m):[]; }
function modelPrice(pool,model,repair){ const c=poolCat(pool); const m=c&&c.models&&c.models[model]; const r=m&&m[repair]; return r?{price:Number(r.price),warranty:r.warranty||''}:null; }
function classifyRepair(label){
  const s=String(label).toLowerCase();
  if(/batter/.test(s)) return 'battery';
  if(/charg/.test(s)) return 'charging';
  if(/back glass|housing|back cover/.test(s)) return 'backglass';
  if(/hdmi/.test(s)) return 'hdmi';
  if(/clean/.test(s)) return 'cleaning';
  if(/screen|display/.test(s)) return 'screen';
  return 'other';
}

function priceCalc(device,category,costIn,laborIn){
  if(!device||!category||laborIn===''||laborIn==null) return null;
  const cleaning=category==='Cleaning / Overheating';
  if(costIn===''&&!cleaning) return null;
  const Cost=costIn===''?0:Number(costIn), Labor=Number(laborIn);
  if(isNaN(Cost)||isNaN(Labor)) return null;
  const ScreenRaw=Cost<100?Cost*1.45:Cost<200?Cost*1.35:Cost<300?Cost*1.28:Cost*1.25;
  const ScreenPart=ScreenRaw<32.5?29.95:ScreenRaw<36.5?34.95:R495(ScreenRaw);
  const BatteryPart     =Math.max(29.95,ceil10(Cost<15?Cost*2.15:Cost<25?Cost*2:Cost<40?Cost*1.8:Cost<100?Cost*1.6:Cost*1.45));
  const ChargingPortPart=Math.max(39.95,ceil10(Cost<15?Cost*2.75:Cost<30?Cost*2.35:Cost<60?Cost*2:Cost<100?Cost*1.65:Cost*1.5));
  const HousingPart     =Math.max(49.95,ceil10(Cost<50?Cost*1.85:Cost<100?Cost*1.65:Cost<200?Cost*1.45:Cost<300?Cost*1.3:Cost*1.2));
  const SmallPart       =Math.max(29.95,ceil10(Cost<10?Cost*3:Cost<25?Cost*2.5:Cost<50?Cost*2:Cost<100?Cost*1.6:Cost*1.45));
  const ConsolePart     =Math.max(39.95,ceil10(Cost<25?Cost*2.5:Cost<75?Cost*2:Cost<150?Cost*1.5:Cost*1.3));
  let part;
  if(device==='Console'){ part=cleaning?0:ConsolePart; }
  else{ part=({'Screen':ScreenPart,'Battery':BatteryPart,'Charging Port':ChargingPortPart,'Back Glass / Housing':HousingPart,'Other Small Parts':SmallPart})[category]??0; }
  const Repair=part+Labor, t=Repair*1.07;
  const shield=t<100?15.25:t<150?22.87:t<200?30.5:t<250?38.12:t<300?45.75:t<350?53.37:t<400?61:t<450?68.61:t<500?76.23:t<550?83.86:t<600?91.48:99.11;
  const screenNC=category==='Screen'&&device!=='Console';
  const customer=screenNC?R495(Repair+shield):ceil10(Repair);
  let mra=null;
  if(screenNC&&costIn!==''){ const sp=round2(Math.round(ScreenRaw/10)*10-0.05); mra=round2(Math.round((sp+Labor)/10)*10-0.05); }
  return {customer,mra};
}
function coverageFor(device,cat){
  if(cat==='Screen') return COV.screen;
  if(cat==='Battery') return COV.battery;
  if(cat==='Cleaning / Overheating') return COV.cleaning;
  if(device==='Console') return COV.consoleHw;
  return COV.lifetime;
}

            : cls==="screen"   ? benefitLine("screen","console")
            : `That console repair comes with a lifetime warranty against part defects.`;
  } else {
    benefit = benefitLine(cls, noun);

  let turn;
  if(cls==="backglass") turn = `Back glass isn't something we keep in stock, so we'll order it in \u2014 it ships overnight, so we'd have it done the next day. There's a fifty-dollar deposit to order the part, and that goes toward the repair.`;

                           ? `If we've got the part in stock, we'll have it done in about 45 minutes to an hour.`
                           : `If we've got the part in stock, we'll have it done in about 30 to 45 minutes.`;
  else if(tier==="2")  turn = `Since it's a ${noun}, we'll check it in to confirm the exact model and order the ${partWord(cls)} \u2014 it comes in overnight, so we'd have it done the next day. There's a fifty-dollar deposit to order the part, and that goes toward the repair.`;

  return `${benefit} ${turn} It's only {price} plus tax.\n\nAre you able to come in today?`;
}

function sayAfterFor(cls,noun,turn,label,warranty){
  if(cls==="screen")   return `For that ${noun} screen repair, the price is {price} plus tax.\n\n${turn}\n\nThat screen repair comes with a lifetime warranty against part-defect issues, and it also includes one free screen re-repair within 12 months \u2014 so if the screen breaks again during that first year, you don't pay for another screen repair.`;
  if(cls==="battery")  return `For that ${noun} battery replacement, the price is {price} plus tax.\n\n${turn}\n\nBattery repairs come with a 1-year warranty against part-defect issues.`;
  if(cls==="charging") return `For that ${noun} charging port repair, the price is {price} plus tax.\n\n${turn}\n\nThat repair comes with a lifetime warranty against part-defect issues \u2014 that covers the replacement part itself, not new physical damage, liquid damage, or misuse.`;
  if(cls==="backglass")return `For that ${noun} back glass repair, the price is {price} plus tax.\n\n${turn}\n\nThat repair comes with a lifetime warranty against part-defect issues \u2014 that covers the replacement part itself, not new physical damage, liquid damage, or misuse.`;
  if(cls==="hdmi")     return `For that HDMI repair, the price is {price} plus tax.\n\n${turn}\n\nIf we replace the HDMI port, that repair comes with a 1-year warranty against part-defect issues \u2014 that doesn't cover physical damage, liquid damage, or misuse.`;
  if(cls==="cleaning") return `For that full cleaning and maintenance service, the price is {price} plus tax.\n\n${turn}\n\nSince we're only cleaning and servicing \u2014 not installing a part \u2014 there's no replacement-part warranty. If we find something needs replacing, we'll explain the option and warranty before moving forward.`;
  const w=String(warranty||"").toLowerCase();
  const art=/lifetime/.test(w)?"a lifetime":/1[\s-]?year/.test(w)?"a 1-year":"a part-defect";
  return `For that ${String(label).toLowerCase()} on your ${noun}, the price is {price} plus tax.\n\n${turn}\n\nThat repair comes with ${art} warranty against part-defect issues.`;
}
function coverageTextFor(cls,warranty){
  if(cls==="screen")   return COV.screen;
  if(cls==="battery")  return COV.battery;
  if(cls==="charging"||cls==="backglass") return COV.lifetime;
  if(cls==="hdmi")     return COV.consoleHw;
  if(cls==="cleaning") return COV.cleaning;
  return warranty||COV.lifetime;
}
function calcCategoryFor(cls){
  return {screen:"Screen",battery:"Battery",charging:"Charging Port",backglass:"Back Glass / Housing",hdmi:"HDMI / Display",cleaning:"Cleaning / Overheating"}[cls]||"Other Small Parts";
}

/* ---- navigation ---- */
let drStack=[];
function startDevice(){ state={mode:"device",actions:new Set()}; drStack=[]; renderDevice({stage:"brand"}); }
function drGo(next){ drStack.push(state.dr); renderDevice(next); }
function drBack(){ if(drStack.length){ renderDevice(drStack.pop()); } else goHome(); }
function drChrome(accent,crumb,total,idx){
  return `<div class="flowbar"><button class="back" id="drBack">${ic('<path d="M15 18l-6-6 6-6"/>')} Back</button>`
    + `<span class="flowtag"><span class="dot" style="background:${accent}"></span>${esc(crumb)}</span>`
    + (total?`<span class="steptrack">Step ${idx} / ${total}</span>`:'') + `</div>`;
}
function renderDevice(dr){
  state.dr=dr;
  if(dr.stage==="brand")  return renderBrand();
  if(dr.stage==="model")  return renderModel();
  if(dr.stage==="repair") return renderRepair();
  if(dr.stage==="result") return renderResult();
}

function renderBrand(){
  const rows=DEVICE_BRANDS.map(b=>`<button class="choice" data-b="${b.id}"><span class="lab">${esc(b.label)}</span><span class="arr">${ic('<path d="M9 18l6-6-6-6"/>')}</span></button>`).join('');
  const right=`<div class="choices">${rows}</div>`;
  stage.innerHTML=screen({flowbar:drChrome(DEVICE_META.color,"Phone, iPad & Console",4,1),accent:DEVICE_META.color,title:"What are we working on?",sub:"Pick the brand or device family.",right});
  document.getElementById('drBack').onclick=drBack;
  stage.querySelectorAll('[data-b]').forEach(btn=>btn.onclick=()=>{
    const b=BRAND_BY_ID[btn.dataset.b];
    if(b.pool) drGo({stage:"model",brandId:b.id});
    else drGo({stage:"repair",brandId:b.id,model:null});
  });
}

function renderModel(){
  const b=BRAND_BY_ID[state.dr.brandId];
  const list=modelsForPool(b.pool);
  const contBtn=`<button class="choice" data-m=""><span class="lab">Continue \u2014 price it by hand</span><span class="arr">${ic('<path d="M9 18l6-6-6-6"/>')}</span></button>`;
  let right, feedNote='', search='';
  if(PRICING.loading){
    right=noteBlock("Loading current prices from the wiki\u2026")+`<div class="choices">${contBtn}</div>`;
  } else if(list.length){
    feedNote='';
    if(list.length>6) search=`<div class="model-search"><span class="ms-ic">${ic('<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>')}</span><input type="text" id="modelSearch" placeholder="Search ${esc(b.label)} models\u2026" autocomplete="off" autocapitalize="off" spellcheck="false"></div>`;
    const rows=list.map(m=>`<button class="choice" data-m="${esc(m)}" data-name="${esc(m.toLowerCase())}"><span class="lab">${esc(m)}</span><span class="arr">${ic('<path d="M9 18l6-6-6-6"/>')}</span></button>`).join('');
    const other=`<button class="choice model-other" data-m="" data-name=""><span class="lab">Other / not listed<small>Price it by hand</small></span><span class="arr">${ic('<path d="M9 18l6-6-6-6"/>')}</span></button>`;
    right=`${feedNote}${search}<div class="choices scroll-list" id="modelList">${rows}<div class="no-match" id="noMatch" style="display:none">No match \u2014 use \u201COther / not listed\u201D below.</div>${other}</div>`;
  } else {
    right=noteBlock(PRICING.ok?"No models listed for this brand yet \u2014 continue and price it by hand.":"Pricing feed unavailable \u2014 continue and price it by hand.","warn")+`<div class="choices">${contBtn}</div>`;
  }
  stage.innerHTML=screen({flowbar:drChrome(b.color,b.label,4,2),accent:b.color,title:`${esc(b.label)} \u2014 which device?`,right});
  document.getElementById('drBack').onclick=drBack;
  stage.querySelectorAll('[data-m]').forEach(btn=>btn.onclick=()=>drGo({stage:"repair",brandId:b.id,model:btn.dataset.m||null}));
  const sb=document.getElementById('modelSearch');
  if(sb){
    const listEl=document.getElementById('modelList'), noMatch=document.getElementById('noMatch');
    const filter=()=>{
      const q=sb.value.trim().toLowerCase(); let shown=0;
      listEl.querySelectorAll('[data-name]').forEach(el=>{
        if(el.classList.contains('model-other')) return;
        const hit=!q||el.dataset.name.indexOf(q)!==-1;
        el.style.display=hit?'':'none'; if(hit)shown++;
      });
      noMatch.style.display=shown?'none':'';
    };
    sb.addEventListener('input',filter);
    setTimeout(()=>sb.focus(),40);
  }
}

function renderRepair(){
  const b=BRAND_BY_ID[state.dr.brandId], fam=DEVICE_FAMILY[b.family], model=state.dr.model;
  const wikiRepairs = model ? modelRepairs(b.pool,model) : [];
  let opts=[];
  if(wikiRepairs.length){
    opts = wikiRepairs.map(r=>({label:r,rt:r}));
    if(b.family==="console") opts.push({label:"Full Cleaning / Maintenance",sub:"Flat $100 \u00B7 excludes Switch",rt:"__cleaning"});
    opts.push({label:"Other / Not Sure",sub:"Price it by hand",rt:"__other"});
  } else {
    opts = fam.repairs.map(r=> r==="Other / Not Sure" ? {label:r,sub:"Price it by hand",rt:"__other"} : {label:r,rt:r,manual:true});
    if(b.family==="console") opts.splice(opts.length-1,0,{label:"Full Cleaning / Maintenance",sub:"Flat $100 \u00B7 excludes Switch",rt:"__cleaning"});
  }
  const rows=opts.map((o,i)=>`<button class="choice" data-i="${i}"><span class="lab">${esc(o.label)}${o.sub?`<small>${esc(o.sub)}</small>`:''}</span><span class="arr">${ic('<path d="M9 18l6-6-6-6"/>')}</span></button>`).join('');
  const who=model?esc(model):esc(b.label);
  stage.innerHTML=screen({flowbar:drChrome(b.color,`${b.label}${model?' \u00B7 '+esc(model):''}`,4,3),accent:b.color,title:`${who} \u2014 what's the repair?`,right:`<div class="choices">${rows}</div>`});
  document.getElementById('drBack').onclick=drBack;
  stage.querySelectorAll('[data-i]').forEach(btn=>btn.onclick=()=>drGo({stage:"result",brandId:b.id,model:model,repairType:opts[+btn.dataset.i].rt}));
}

function renderResult(){
  const b=BRAND_BY_ID[state.dr.brandId], fam=DEVICE_FAMILY[b.family], model=state.dr.model, rt=state.dr.repairType;
  const noun=b.noun;

  let feed=null, cls, repairLabel;
  if(rt==="__cleaning"){ feed={price:100,warranty:"Service only \u2014 no part warranty"}; cls="cleaning"; repairLabel="Full Cleaning / Maintenance"; }
  else if(rt==="__other"){ cls="other"; repairLabel="Other / Not Sure"; }
  else { repairLabel=rt; cls=classifyRepair(rt); if(model) feed=modelPrice(b.pool,model,rt); }

  const tier=deviceTier(b, model, cls);
  const who=model?esc(model):esc(b.label);
  const sub=`<div class="result-meta"><span>${esc(repairLabel)}</span><span class="dotsep">\u00B7</span><span>${esc(turnMeta(b,model,cls))}</span></div>`;

  // LEFT = what to say (warranty + turnaround + price + ask, all in one script)
  let left='';
  if(feed){
    left=sayBlock(tierScript(tier,cls,noun),"Say to caller");
  } else if(rt==="__other"){
    const cats=b.family==="console"?["Other"]:["Charging Port","Back Glass / Housing","Other Small Parts"];
    left=calcBlock({device:fam.device,labor:fam.labor,categories:cats,hint:"not in wiki"})
      + sayBlock("We can help with that \u2014 let me pull up the exact repair and part availability so I can give you the right price and turnaround instead of guessing.");
  } else {
    const cat=calcCategoryFor(cls);
    left=calcBlock({device:fam.device,labor:fam.labor,category:cat,noCost:cls==="cleaning",hint:"not in wiki"})
      + sayBlock(tierScript(tier,cls,noun),"Say after price lookup");
  }

  // RIGHT = close the call cards; Objections full-width below — same layout as the computer flow
  const right=computerCloseCards();
  const full=deviceObjections();

  const footer=`<button class="btn-ghost" id="drBack">${ic('<path d="M15 18l-6-6 6-6"/>')} Back</button><button class="btn-primary push" id="drFinish">${ic('<path d="M20 6 9 17l-5-5"/>')} Finish call</button>`;
  stage.innerHTML=screen({flowbar:drChrome(b.color,`${b.label}${model?' \u00B7 '+esc(model):''}`,4,4),accent:b.color,title:who,sub,left,right,full,footer});

  stage.querySelectorAll('#drBack').forEach(x=>x.onclick=drBack);
  document.getElementById('drFinish').onclick=goHome;
  stage.querySelectorAll('.calc').forEach(setupCalc);
  if(feed){ const sp=stage.querySelector('.say-price'); if(sp) sp.textContent=money(feed.price); }
  wireClosing(); wireChecklist();
}

function wireClosing(){
  stage.querySelectorAll('[data-r]').forEach(bn=>bn.onclick=()=>{
    stage.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('on',x===bn));
    stage.querySelectorAll('[data-rev]').forEach(r=>r.classList.toggle('show',r.dataset.rev===bn.dataset.r));
  });
  stage.querySelectorAll('[data-o]').forEach(bn=>bn.onclick=()=>{
    const was=bn.classList.contains('on');
    stage.querySelectorAll('[data-o]').forEach(x=>x.classList.remove('on'));
    stage.querySelectorAll('[data-orev]').forEach(r=>r.classList.remove('show'));
    if(!was){ bn.classList.add('on'); const t=stage.querySelector(`[data-orev="${bn.dataset.o}"]`); if(t) t.classList.add('show'); }
  });
}
function wireChecklist(){
  stage.querySelectorAll('.act').forEach(bn=>bn.onclick=()=>{
    const a=bn.dataset.act;
    if(state.actions.has(a)) state.actions.delete(a); else state.actions.add(a);
    bn.classList.toggle('on');
  });
}


function screen(o){
  const left=o.left||'', right=o.right||'';
  const split = left
    ? `<div class="split"><div class="pane pane-script">${left}</div><div class="pane pane-choices">${right}</div></div>`
    : `<div class="split solo"><div class="pane pane-choices">${right}</div></div>`;
  let h=(o.flowbar||'');
  h+=`<div class="panel${o.home?' greet-home':''}" style="--flow:${o.accent||'var(--accent)'};--flow-soft:${o.accentSoft||'#EEF0F4'}">`;
  h+=`<div class="panel-head">`;
  if(o.eyebrow) h+=`<div class="eyebrow">${esc(o.eyebrow)}</div>`;
  if(o.title) h+=`<h2 class="step-title">${o.title}</h2>`;
  if(o.sub) h+=`<div class="step-sub">${o.sub}</div>`;
  h+=`</div>`+split;
  if(o.full) h+=`<div class="fullrow">${o.full}</div>`;
  if(o.footer) h+=`<div class="footer-nav">${o.footer}</div>`;
  h+=`</div>`;
  return h;
}

function renderHome(){
  const tile=(id,f,isDevice)=>`<button class="tile" data-${isDevice?'device':'flow'}="${id}" style="--tint:${f.color||f.tint};--tint-soft:${f.tintSoft||'#EEF0F4'}"><span class="ic">${ic(f.icon)}</span><span class="txt"><h3>${esc(f.label)}</h3><p>${esc(f.desc)}</p></span><span class="arr">${ic('<path d="M9 18l6-6-6-6"/>')}</span></button>`;
  const tiles=[tile('computer',FLOWS.computer,false),tile('device',DEVICE_META,true),tile('support',FLOWS.support,false)].join('');
  const left=sayBlock("Thanks for calling Computer Warriors, this is [name]. Who do I have the pleasure of speaking with?")
    + noteBlock("Get the customer's name and use it naturally during the call.")
    + sayBlock("Hey [name], how can we help you today?","Then say")
    + noteBlock("Ask about the device type, the issue, or whether they need remote / onsite help.");
  const right=`<div class="pane-title">What's the call about?</div><div class="pane-sub">Pick the closest match \u2014 switch anytime with Home.</div><div class="tiles">${tiles}</div>`;
  stage.innerHTML=screen({home:true,accent:'var(--accent)',eyebrow:"Every call starts here",title:"Greet the caller",left,right});
  stage.querySelectorAll('.tile').forEach(t=>t.onclick=()=> t.dataset.device ? startDevice() : startFlow(t.dataset.flow));
}

function renderInfo(){
  const loc=l=>`<div class="note"><span class="nk">${esc(l.name)}</span><b>${esc(l.addr)}</b>${l.near?`<span class="near">${esc(l.near)}</span>`:''}${l.phone?`<span class="near">${esc(l.phone)}</span>`:''}</div>`;
  const row=(t,d)=>`<li><span class="ct">${esc(t)}</span><span>${esc(d)}</span></li>`;
  stage.innerHTML=`
    <div class="flowbar"><button class="back" id="backBtn">${ic('<path d="M15 18l-6-6 6-6"/>')} Back</button><span class="flowtag">Quick info</span></div>
    <div class="panel"><div class="panel-body">
      <div class="eyebrow">Hours &amp; locations</div>
      <h2 class="step-title">${esc(SHOP.hours)}</h2>
      <p class="step-sub">Walk-ins welcome. No appointment needed.</p>
      ${loc(SHOP.wilmington)}${loc(SHOP.jacksonville)}
    </div></div>`;
  document.getElementById('backBtn').onclick=()=>{
    if(!state) renderHome();
    else if(state.mode==="device" && state.dr) renderDevice(state.dr);
    else renderStep();
  };
}

function startFlow(id){ state={flowId:id,idx:0,actions:new Set()}; history=[]; renderStep(); }

function renderStep(){
  const flow=FLOWS[state.flowId], step=flow.steps[state.idx], total=flow.steps.length;
  let flowbar=`<div class="flowbar"><button class="back" id="backBtn">${ic('<path d="M15 18l-6-6 6-6"/>')} Back</button><span class="flowtag"><span class="dot" style="background:${flow.color}"></span>${esc(flow.label)}</span>`;
  if(total>1) flowbar+=`<span class="steptrack">Step ${state.idx+1} / ${total}</span>`;
  flowbar+=`</div>`;

  // LEFT = what to say/read
  let left='';
  if(step.say) left+=sayBlock(step.say);
  if(step.note) left+=noteBlock(step.note,step.warn);

  // RIGHT = what to do
  let right='';
  if(step.embed) right+=embedBlock(step.embed);
  if(step.sayAfterEmbed) right+=sayBlock(step.sayAfterEmbed,"Once submitted, say");
  if(step.extras) right+=extrasBlock(step.extras);
  if(step.sections){ right+=`<div class="sec-lbl">Pricing &amp; coverage</div>`+step.sections.map(sectionBlock).join(''); }
  if(step.choices) right+=choicesBlock(step.choices);
  let full='';
  if(step.close){
    if(step.noAsk){ right+=computerCloseCards(); full=computerObjections(); }
    else right+=closingBlock(false);
  }
  if(step.checklist) right+=checklistBlock(step.checklist);

  let footer='';
  if(step.end) footer=`<button class="btn-ghost" id="prevBtn">${ic('<path d="M15 18l-6-6 6-6"/>')} Back</button><button class="btn-primary push" id="finishBtn">${ic('<path d="M20 6 9 17l-5-5"/>')} Finish call</button>`;
  else if(step.choices) footer=`<button class="btn-ghost" id="prevBtn">Back</button><span class="push hint">Pick an option to continue</span>`;
  else footer=`<button class="btn-ghost" id="prevBtn">Back</button><button class="btn-primary push" id="nextBtn">Next ${ic('<path d="M9 18l6-6-6-6"/>')}</button>`;

  stage.innerHTML=screen({flowbar,accent:flow.color,accentSoft:flow.tintSoft,title:esc(step.title),sub:step.sub?esc(step.sub):'',left,right,full,footer});
  wireStep(step);
}

function wireStep(step){
  document.getElementById('backBtn').onclick=()=>{ if(history.length){state.idx=history.pop();renderStep();} else renderHome(); };
  const prev=document.getElementById('prevBtn'); if(prev) prev.onclick=()=>{ if(history.length){state.idx=history.pop();renderStep();} else renderHome(); };
  const next=document.getElementById('nextBtn'); if(next) next.onclick=()=>goNext(step.next);
  const finish=document.getElementById('finishBtn'); if(finish) finish.onclick=goHome;

  stage.querySelectorAll('.choice').forEach(b=>b.onclick=()=>goNext(step.choices[+b.dataset.choice].next));

  // accordions
  stage.querySelectorAll('.acc-head').forEach(hd=>hd.onclick=()=>hd.parentElement.classList.toggle('open'));

  // calculators
  stage.querySelectorAll('.calc').forEach(setupCalc);

  // closing reveals
  const closing=stage.querySelector('.closing');
  if(closing){
    closing.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{
      closing.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('on',x===b));
      closing.querySelectorAll('[data-rev]').forEach(r=>r.classList.toggle('show',r.dataset.rev===b.dataset.r));
    });
    // objection buttons: toggle off if re-tapped, so nothing is forced open
    closing.querySelectorAll('[data-o]').forEach(b=>b.onclick=()=>{
      const was=b.classList.contains('on');
      closing.querySelectorAll('[data-o]').forEach(x=>x.classList.remove('on'));
      closing.querySelectorAll('[data-orev]').forEach(r=>r.classList.remove('show'));
      if(!was){ b.classList.add('on'); const t=closing.querySelector(`[data-orev="${b.dataset.o}"]`); if(t) t.classList.add('show'); }
    });
  }

  // checklist
  stage.querySelectorAll('.act').forEach(b=>b.onclick=()=>{
    const a=b.dataset.act;
    if(state.actions.has(a)) state.actions.delete(a); else state.actions.add(a);
    b.classList.toggle('on');
  });
}

function setupCalc(el){
  const device=el.dataset.device, fixed=el.dataset.category;
  const cost=el.querySelector('.c-cost'), labor=el.querySelector('.c-labor'), catSel=el.querySelector('.c-cat');
  const cust=el.querySelector('.c-cust'), mraWrap=el.querySelector('.c-mra-wrap'), mra=el.querySelector('.c-mra');
  const scope=el.closest('.acc-body')||stage;
  const sayPrice=scope.querySelector('.say-price'), cov=scope.querySelector('.c-cov');
  function currentCat(){ return catSel?catSel.value:fixed; }
  function run(){
    const cat=currentCat();
    if(cov&&catSel) cov.textContent=coverageFor(device,cat);
    const r=priceCalc(device,cat,cost?cost.value:'',labor.value);
    if(!r){ cust.textContent='$—'; if(sayPrice)sayPrice.textContent='$xxx.xx'; if(mraWrap)mraWrap.style.display='none'; return; }
    cust.textContent=money(r.customer);
    if(sayPrice) sayPrice.textContent=money(r.customer);
    if(mraWrap){ if(r.mra!=null){ mraWrap.style.display=''; mra.textContent=money(r.mra);} else mraWrap.style.display='none'; }
  }
  [cost,labor,catSel].forEach(i=>{ if(i){ i.addEventListener('input',run); i.addEventListener('change',run);} });
  run();
}

function goNext(id){
  const flow=FLOWS[state.flowId];
  history.push(state.idx);
  const i=id?flow.steps.findIndex(s=>s.id===id):-1;
  state.idx=i>=0?i:Math.min(state.idx+1,flow.steps.length-1);
  renderStep();
}

document.getElementById('homeBtn').onclick=goHome;
document.getElementById('infoBtn').onclick=renderInfo;
goHome();
loadPricing().then(()=>{ if(state){ if(state.mode==="device"&&state.dr) renderDevice(state.dr); else renderStep(); } });
</script>
</body>
